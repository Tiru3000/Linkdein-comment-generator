<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Comment Generator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #0A66C2;
      flex-shrink: 0;
    }

    .title {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: #555;
      font-size: 14px;
    }

    .label {
      color: #888;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
    }

    textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 14px;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #0A66C2;
    }

    .btn {
      width: 100%;
      background: #0A66C2;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: -0.2px;
      transition: opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
    }

    .output-box {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 14px;
    }

    .output-box.visible {
      display: flex;
    }

    .output-text {
      color: #e8e8e8;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .copy-btn {
      background: #0A66C2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .regen-btn {
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .error {
      color: #ff5555;
      font-size: 13px;
      display: none;
    }

    .error.visible {
      display: block;
    }

    .tip {
      color: #444;
      font-size: 12px;
      line-height: 1.5;
    }

    .loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="dot"></div>
      <span class="title">Comment Generator</span>
      <span class="subtitle">for LinkedIn</span>
    </div>

    <div>
      <label class="label">Paste the LinkedIn post</label>
      <textarea id="postInput" rows="6" placeholder="Paste a founder or CEO's post here..."></textarea>
    </div>

    <button class="btn" id="generateBtn" onclick="generateComment()">
      Generate Comment
    </button>

    <div class="error" id="errorMsg">Something went wrong. Try again.</div>

    <div class="output-box" id="outputBox">
      <p class="output-text" id="outputText"></p>
      <div class="actions">
        <button class="copy-btn" onclick="copyComment()">Copy</button>
        <button class="regen-btn" onclick="generateComment()">Regenerate</button>
      </div>
    </div>

    <p class="tip">Tip — post your comment within the first hour of the founder's post going live.</p>
  </div>

  <script>
    const SYSTEM_PROMPT = `You are a LinkedIn comment writer for Tripati, a brand designer and strategist who works with founders and CEOs.

Your job is to write ONE powerful LinkedIn comment based on a post the user pastes.

Tripati's comment style:
- Sounds like a sharp peer, not a vendor or fan
- Never uses "Great post!" or generic praise
- Adds a real insight, contrarian angle, or extends the idea
- Always ends with ONE specific, curious question
- Maximum 3-4 lines
- No emojis
- No "I help with branding" or service pitching
- Sounds human, conversational, a little bold
- Makes the founder think "who is this person"

Framework: Hook → Insight → Question

Return ONLY the comment text. No explanation, no label, no quotes around it.`;

    async function generateComment() {
      const post = document.getElementById('postInput').value.trim();
      if (!post) return;

      const btn = document.getElementById('generateBtn');
      const outputBox = document.getElementById('outputBox');
      const outputText = document.getElementById('outputText');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-row"><span class="spinner"></span>Generating...</span>';
      outputBox.classList.remove('visible');
      errorMsg.classList.remove('visible');

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: [
              {
                role: 'user',
                content: `Here is the LinkedIn post:\n\n${post}\n\nWrite a comment for this post.`
              }
            ]
          })
        });

        const data = await response.json();
        const text = (data.content || []).map(i => i.text || '').join('').trim();

        if (text) {
          outputText.textContent = text;
          outputBox.classList.add('visible');
        } else {
          errorMsg.classList.add('visible');
        }
      } catch (err) {
        errorMsg.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Comment';
      }
    }

    function copyComment() {
      const text = document.getElementById('outputText').textContent;
      navigator.clipboard.writeText(text);
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ Copied';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    }
  </script>
</body>
</html>
